<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMW Fan Club</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo">BMW</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>BMW Driving Experience</h1>
            <p>The Ultimate Driving Machine</p>
            <button id="exploreBtn">Explore More</button>
        </div>
    </section>

    <section id="about" class="about">
        <h2>About BMW</h2>
        <p>
            BMW is one of the world's leading luxury automobile manufacturers,
            known for performance, innovation, and premium design.
        </p>
    </section>

    <section id="gallery" class="gallery">
        <h2>BMW Gallery</h2>

        <div class="gallery-container">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e" alt="BMW">
            <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="BMW">
            <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7" alt="BMW">
        </div>
    </section>

    <section id="contact" class="contact">
        <h2>Contact Us</h2>

        <form id="contactForm">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <footer>
        <p>© 2026 BMW Fan Club</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
